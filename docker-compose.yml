version: '3.8'

networks:
  gdb-network:
    driver: bridge

services:
  # --- Core Infrastructure Database Subsystem ---
  gdb-database:
    image: postgres:15-alpine
    container_name: gdb-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - gdb-db-data:/var/lib/postgresql/data
    networks:
      - gdb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Infrastructure Registry Services ---
  eureka-server:
    image: gdb-eureka-server:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8761
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    networks:
      - gdb-network

  gateway-service:
    image: gdb-gateway-service:latest
    container_name: gateway-service
    ports:
      - "8060:8060"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8060
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - gdb-network

  # --- Microservices Subsystem ---
  auth-service:
    image: gdb-auth-service:latest
    container_name: auth-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://gdb-database:5432/gdb_auth_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      gdb-database:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - gdb-network

  users-service:
    image: gdb-users-service:latest
    container_name: users-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://gdb-database:5432/gdb_users_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      gdb-database:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - gdb-network

  account-service:
    image: gdb-account-service:latest
    container_name: account-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://gdb-database:5432/gdb_accounts_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      gdb-database:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - gdb-network

  transactions-service:
    image: gdb-transactions-service:latest
    container_name: transactions-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://gdb-database:5432/gdb_transactions_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      gdb-database:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - gdb-network

  company-service:
    image: gdb-company-service:latest
    container_name: company-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - gdb-network

  payment-gateway-service:
    image: gdb-payment-gateway-service:latest
    container_name: payment-gateway-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - gdb-network

  aadhar-service:
    image: gdb-aadhar-service:latest
    container_name: aadhar-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - gdb-network

  # --- React Vite Frontend Layer ---
  frontend:
    image: gdb-frontend:latest
    container_name: gdb-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway-service
    networks:
      - gdb-network

volumes:
  gdb-db-data:
